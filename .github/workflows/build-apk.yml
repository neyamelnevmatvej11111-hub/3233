name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Set up Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          # Accept licenses (non-interactive)
          yes | sdkmanager --licenses
          # Install necessary tools
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Configure Godot Android SDK path (fast, without loading project)
        run: |
          mkdir -p /tmp/empty_project
          godot --headless --path /tmp/empty_project --editor-settings export/android/android_sdk_path=$ANDROID_HOME

      - name: Verify Android SDK setting (optional)
        run: |
          grep android_sdk_path ~/.config/godot/editor_settings-4.tres || echo "Setting not found"

      - name: Generate debug keystore in standard location
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare build directory
        run: mkdir -p build

      - name: Export APK
        run: |
          godot --headless --verbose --export-debug "Android" "build/SupermarketSimulator.apk"
          echo "Exit code: $?"
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: error
          retention-days: 30
