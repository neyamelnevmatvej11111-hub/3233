name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Set up Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "platforms;android-33"

      - name: Configure Godot Android SDK path (direct file write)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          EOF

      - name: Set debug keystore in export preset
        run: |
          # Ensure the preset uses the default debug keystore explicitly
          sed -i 's|keystore/debug=""|keystore/debug="~/.local/share/godot/keystores/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          # Also ensure package/signed is false (debug builds)
          sed -i 's|package/signed=.*|package/signed=false|' export_presets.cfg

      - name: Validate export preset (list presets)
        run: |
          godot --headless --list-export-presets || echo "Listing failed"

      - name: Generate debug keystore (Godot's default location)
        run: |
          # This will be generated automatically by Godot on first export, but we create it manually to avoid any issues
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkey -v -keystore ~/.local/share/godot/keystores/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare build directory
        run: mkdir -p build

      - name: Export APK (with full verbose output)
        run: |
          # Run export and capture stderr to a file
          godot --headless --verbose --export-debug "Android" "build/SupermarketSimulator.apk" 2>&1 | tee export.log
          echo "Exit code: $?"
          cat export.log
          # Check for specific errors
          grep -i "error" export.log || echo "No errors found in log"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload export log (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-log
          path: export.log
          retention-days: 7
