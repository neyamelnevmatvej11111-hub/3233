name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Set up Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK components (multiple versions)
        run: |
          yes | sdkmanager --licenses
          # Устанавливаем build-tools для разных версий
          sdkmanager "platform-tools" \
                     "build-tools;33.0.0" \
                     "build-tools;34.0.0" \
                     "build-tools;35.0.0" \
                     "platforms;android-33" \
                     "platforms;android-34" \
                     "platforms;android-35"

      - name: Verify Android SDK installation
        run: |
          echo "Installed platforms:"
          ls -la $ANDROID_HOME/platforms/ || echo "No platforms found"
          echo "Installed build-tools:"
          ls -la $ANDROID_HOME/build-tools/ || echo "No build-tools found"

      - name: Configure Godot Android SDK path (direct file write)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          EOF

      - name: Generate debug keystore in Godot's default location
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkey -v -keystore ~/.local/share/godot/keystores/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      # === Проверка: создаём минимальный проект и экспортируем его ===
      - name: Create minimal test project
        run: |
          mkdir -p test_project
          cd test_project
          # Создаём project.godot
          cat > project.godot << EOF
          ; Engine configuration file.
          ; It's best edited using the editor UI and not directly,
          ; since the parameters that go here are not all obvious.
          ;
          ; Format:
          ;   [section] ; section comments
          ;   setting=value ; setting comments
          ;
          ; This file is intentionally empty.
          [application]
          config/name="TestProject"
          config/version="1.0"
          run/main_scene="res://main.tscn"
          [rendering]
          renderer/rendering_method="gl_compatibility"
          renderer/rendering_method.mobile="gl_compatibility"
          renderer/rendering_method.web="gl_compatibility"
          [display]
          window/size/viewport_width=1280
          window/size/viewport_height=720
          [editor_plugins]
          enabled=PackedStringArray()
          EOF
          # Создаём простую сцену main.tscn
          cat > main.tscn << EOF
          [gd_scene load_steps=2 format=3 uid="uid://test"]

          [ext_resource type="Script" path="res://main.gd" id="1"]

          [node name="Node2D" type="Node2D"]
          script = ExtResource("1")
          EOF
          # Создаём скрипт main.gd
          cat > main.gd << EOF
          extends Node2D

          func _ready():
              print("Hello from test project")
          EOF
          # Создаём экспортный пресет для Android
          cat > export_presets.cfg << EOF
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/test.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.test.test"
          package/name="TestProject"
          package/signed=false
          package/classify_as_game=true
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_as_launcher_icon=true
          package/show_in_app_library=true
          package/meta_quest_mode=0
          version/code=1
          version/name="1.0"
          orientation/screen_orientation=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          screen/opengl_debug=false
          user_data_backup/allow=false
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          xr_features/degrees_of_freedom=0
          xr_features/hand_tracking=0
          xr_features/hand_tracking_frequency=0
          xr_features/passthrough=0
          EOF

      - name: Export test APK
        run: |
          cd test_project
          mkdir -p build
          godot --headless --verbose --export-debug "Android" "build/test.apk" 2>&1 | tee test_export.log
          echo "Test export exit code: $?"
          if [ -f build/test.apk ]; then
            echo "✅ Test APK built successfully"
            ls -la build/
          else
            echo "❌ Test APK build failed"
            cat test_export.log
            exit 1
          fi

      # === Если тестовый экспорт прошёл, пробуем экспортировать ваш проект ===
      - name: Prepare your project export preset
        if: success()
        run: |
          # Убедимся, что в вашем export_presets.cfg заполнены поля keystore
          KEYSTORE_PATH="$HOME/.local/share/godot/keystores/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KEYSTORE_PATH\"|" export_presets.cfg
          sed -i "s|keystore/debug_user=\"\"|keystore/debug_user=\"androiddebugkey\"|" export_presets.cfg
          sed -i "s|keystore/debug_password=\"\"|keystore/debug_password=\"android\"|" export_presets.cfg
          sed -i 's|package/signed=.*|package/signed=false|' export_presets.cfg
          # Добавляем target_sdk_version, если отсутствует
          if ! grep -q "target_sdk_version" export_presets.cfg; then
            sed -i '/^\[preset.0.options\]/a target_sdk_version=34' export_presets.cfg
          fi
          cat export_presets.cfg

      - name: Export your APK
        if: success()
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" "build/SupermarketSimulator.apk" 2>&1 | tee your_export.log
          echo "Exit code: $?"
          if [ -f build/SupermarketSimulator.apk ]; then
            echo "✅ Your APK built successfully"
          else
            echo "❌ Your APK build failed"
            cat your_export.log
            exit 1
          fi

      - name: Upload APK (if any)
        if: success() && (success() || failure())
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test APK (for diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-APK
          path: test_project/build/test.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload export logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs
          path: |
            test_project/test_export.log
            your_export.log
          if-no-files-found: ignore
          retention-days: 7
