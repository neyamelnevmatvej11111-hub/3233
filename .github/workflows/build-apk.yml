name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Set up Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Configure Godot Android SDK path (direct file write)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          EOF

      - name: Generate new export_presets.cfg from scratch (fix configuration)
        run: |
          # Create a clean export_presets.cfg with correct Android preset
          cat > export_presets.cfg << 'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/SupermarketSimulator.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="~/.local/share/godot/keystores/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.game.supermarket3d"
          package/name="Supermarket Simulator 3D"
          package/signed=false
          package/classify_as_game=true
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_as_launcher_icon=true
          package/show_in_app_library=true
          package/meta_quest_mode=0
          version/code=1
          version/name="1.0"
          orientation/screen_orientation=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          screen/opengl_debug=false
          user_data_backup/allow=false
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          xr_features/degrees_of_freedom=0
          xr_features/hand_tracking=0
          xr_features/hand_tracking_frequency=0
          xr_features/passthrough=0
          EOF

      - name: Generate debug keystore in Godot's default location
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkey -v -keystore ~/.local/share/godot/keystores/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare build directory
        run: mkdir -p build

      - name: Export APK
        run: |
          godot --headless --verbose --export-debug "Android" "build/SupermarketSimulator.apk" 2>&1 | tee export.log
          echo "Exit code: $?"
        timeout-minutes: 15

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload export log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-log
          path: export.log
          retention-days: 7
