name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/
          ls ~/.local/share/godot/export_templates/4.6.stable/ | grep android

      - name: Setup Android SDK path in Godot
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "SDK: $SDK"
          mkdir -p ~/.config/godot
          echo "[gd_resource type=\"EditorSettings\" format=3]" > ~/.config/godot/editor_settings-4.tres
          echo "" >> ~/.config/godot/editor_settings-4.tres
          echo "[resource]" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$SDK\"" >> ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore "$HOME/debug.keystore" -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare build directory
        run: mkdir -p build

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" "build/SupermarketSimulator.apk"
          echo "Exit: $?"
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: error
          retention-days: 30
